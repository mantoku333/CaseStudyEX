name: CI and Jenkins Trigger

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-ci-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Show trigger info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

      - name: Read Unity version
        shell: bash
        run: |
          UNITY_VERSION=$(grep 'm_EditorVersion:' ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          if [[ -z "$UNITY_VERSION" ]]; then
            echo "::error::Could not detect Unity version from ProjectSettings/ProjectVersion.txt"
            exit 1
          fi
          echo "Detected Unity version: $UNITY_VERSION"

      - name: Check for merge conflict markers
        shell: bash
        run: |
          if grep -RInE "^(<<<<<<<|=======|>>>>>>>)" Assets Packages ProjectSettings \
            --exclude='*.png' --exclude='*.jpg' --exclude='*.dll' --binary-files=without-match; then
            echo "::error::Merge conflict markers were found."
            exit 1
          fi
          echo "No merge conflict markers found."

  trigger-jenkins:
    runs-on: ubuntu-latest
    needs: quick-ci-checks
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Trigger Jenkins build
        if: ${{ secrets.JENKINS_WEBHOOK_URL != '' }}
        env:
          JENKINS_WEBHOOK_URL: ${{ secrets.JENKINS_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST "$JENKINS_WEBHOOK_URL" \
            --data-urlencode "cause=github-actions" \
            --data-urlencode "git_sha=${{ github.sha }}" \
            --data-urlencode "git_ref=${{ github.ref }}"
          echo "Jenkins trigger request sent."

      - name: Jenkins webhook not configured
        if: ${{ secrets.JENKINS_WEBHOOK_URL == '' }}
        run: |
          echo "::warning::JENKINS_WEBHOOK_URL secret is not configured."
          echo "::warning::Set this secret to trigger Jenkins automatically after CI passes on master."
